<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Wordle</title>
    <style>
      :root {
        --bg: #f3f7fb;
        --bg-top: #d9efff;
        --panel: #ffffff;
        --ink: #102a43;
        --muted: #5d6d7e;
        --line: #d9e2ec;
        --accent: #0d6efd;
        --secondary-bg: #e6edf5;
        --secondary-ink: #1f3b57;
        --status-ink: #224870;
        --tile-bg: #fdfefe;
        --attempt-bg: #f9fbfe;
        --stats-ink: #163550;
        --log-bg: #081527;
        --log-ink: #d8f0ff;
        --good: #2f9e44;
        --warn: #e0a800;
        --bad: #7c8594;
        color-scheme: light;
      }

      :root[data-theme="dark"] {
        --bg: #0a1018;
        --bg-top: #182638;
        --panel: #111a26;
        --ink: #e5eef7;
        --muted: #9db2c7;
        --line: #27374a;
        --accent: #4ea1ff;
        --secondary-bg: #1a2a3d;
        --secondary-ink: #deebf8;
        --status-ink: #9ec8f6;
        --tile-bg: #142234;
        --attempt-bg: #122033;
        --stats-ink: #b9d8f4;
        --log-bg: #050a12;
        --log-ink: #bfe8ff;
        --good: #2f9e44;
        --warn: #c79317;
        --bad: #5c6677;
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        background: radial-gradient(circle at top left, var(--bg-top), var(--bg) 35%);
        color: var(--ink);
      }

      .app {
        width: min(1100px, 96vw);
        margin: 24px auto 36px;
        display: grid;
        gap: 16px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px;
        box-shadow: 0 4px 12px rgba(17, 36, 58, 0.05);
      }

      h1 {
        margin: 0 0 6px;
        font-size: 1.55rem;
      }

      .sub {
        margin: 0;
        color: var(--muted);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
        gap: 10px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 0.92rem;
        color: var(--muted);
      }

      input,
      select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px;
        font-size: 0.95rem;
        background: var(--panel);
        color: var(--ink);
      }

      input::placeholder {
        color: var(--muted);
      }

      input:focus,
      select:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 22%, transparent);
      }

      select {
        appearance: none;
        -webkit-appearance: none;
        -moz-appearance: none;
        padding-right: 34px;
        background-image:
          linear-gradient(45deg, transparent 50%, var(--muted) 50%),
          linear-gradient(135deg, var(--muted) 50%, transparent 50%);
        background-position:
          calc(100% - 16px) calc(50% + 1px),
          calc(100% - 11px) calc(50% + 1px);
        background-size: 5px 5px, 5px 5px;
        background-repeat: no-repeat;
      }

      .btns {
        display: flex;
        gap: 8px;
        margin-top: 10px;
        flex-wrap: wrap;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 12px;
        cursor: pointer;
        font-size: 0.95rem;
      }

      button.primary {
        background: var(--accent);
        color: #fff;
      }

      button.secondary {
        background: var(--secondary-bg);
        color: var(--secondary-ink);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .status {
        margin-top: 8px;
        color: var(--status-ink);
        font-size: 0.95rem;
      }

      .board {
        display: grid;
        gap: 8px;
      }

      .row {
        display: grid;
        grid-template-columns: repeat(5, minmax(44px, 56px));
        gap: 7px;
      }

      .tile {
        height: 56px;
        display: grid;
        place-items: center;
        border-radius: 10px;
        border: 1px solid var(--line);
        font-weight: 700;
        font-size: 1.25rem;
        text-transform: uppercase;
        background: var(--tile-bg);
      }

      .tile.correct {
        background: var(--good);
        color: #fff;
        border-color: transparent;
      }

      .tile.present {
        background: var(--warn);
        color: #fff;
        border-color: transparent;
      }

      .tile.absent {
        background: var(--bad);
        color: #fff;
        border-color: transparent;
      }

      .cols {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .log {
        height: 260px;
        overflow: auto;
        margin: 0;
        background: var(--log-bg);
        color: var(--log-ink);
        padding: 10px;
        border-radius: 10px;
        font-size: 0.88rem;
        line-height: 1.35;
        white-space: pre-wrap;
      }

      .attempt-list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 10px;
      }

      .attempt-list li {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 9px;
        background: var(--attempt-bg);
      }

      .attempt-title {
        font-weight: 600;
        margin-bottom: 4px;
      }

      .attempt-meta {
        margin: 0;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      }

      .hint {
        margin-top: 8px;
        color: var(--muted);
        font-size: 0.85rem;
      }

      .inline-settings {
        margin-top: 8px;
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .inline-settings input[type="checkbox"] {
        width: 16px;
        height: 16px;
        margin: 0 5px 0 0;
        transform: translateY(2px);
      }

      .inline-settings input[type="number"] {
        width: 90px;
        padding: 7px 8px;
      }

      .stats {
        margin-top: 8px;
        color: var(--stats-ink);
        font-size: 0.9rem;
      }

      @media (min-width: 960px) {
        .cols {
          grid-template-columns: 1fr 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <h1>LLM Wordle (Single File)</h1>
        <p class="sub">Stream assistant reasoning, support tool call or response parsing mode, and score with Wordle rules.</p>
      </section>

      <section class="panel">
        <div class="grid">
          <label>
            Base URL
            <input id="baseUrl" type="text" placeholder="https://api.openai.com/v1" />
          </label>
          <label>
            API Key
            <input id="apiKey" type="password" placeholder="sk-..." />
          </label>
          <label>
            Model
            <input id="model" type="text" placeholder="gpt-4.1-mini" />
          </label>
          <label>
            Temperature
            <input id="temperature" type="number" min="0" max="2" step="0.1" value="0.4" placeholder="0.4" />
          </label>
          <label>
            Max Tokens
            <input id="maxTokens" type="number" min="1" step="1" value="512" placeholder="512" />
          </label>
          <label>
            Turns
            <input id="maxAttempts" type="number" min="1" max="20" step="1" value="6" placeholder="6" />
          </label>
          <label>
            Processing Mode
            <select id="processingMode">
              <option value="tool_call">tool_call (default)</option>
              <option value="response_parsing">response_parsing</option>
            </select>
          </label>
          <label>
            Request Build Mode
            <select id="requestBuildMode">
              <option value="cumulative">cumulative (default)</option>
              <option value="last_record">last_record (latest tool result only)</option>
            </select>
          </label>
        </div>
        <div class="btns">
          <button id="startBtn" class="primary">Start New Game</button>
          <button id="stopBtn" class="secondary" disabled>Stop</button>
          <button id="saveBtn" class="secondary">Save Config</button>
          <button id="themeToggle" class="secondary" type="button" aria-label="Toggle color theme">Theme: System</button>
        </div>
        <div class="inline-settings">
          <label><input id="autoNext" type="checkbox" />Auto Next Game</label>
          <label>Delay(s): <input id="autoDelay" type="number" min="0" max="60" step="1" value="3" /></label>
          <label>Live Stream Max Lines: <input id="streamMaxLines" type="number" min="50" max="5000" step="50" value="500" /></label>
        </div>
        <div class="status" id="status">Idle.</div>
        <div class="stats" id="stats"></div>
        <div class="hint">Config is saved to <span class="mono">localStorage</span> in this browser only.</div>
      </section>

      <section class="panel cols">
        <div>
          <h2>Board</h2>
          <div id="board" class="board"></div>
        </div>
        <div>
          <h2>Live Stream</h2>
          <pre id="streamLog" class="log"></pre>
        </div>
      </section>

      <section class="panel">
        <h2>Guess History</h2>
        <ul id="attempts" class="attempt-list"></ul>
      </section>
    </main>

    <script>

        "ralph", "liver", "decor", "alice", "intro", "clerk", "sigma", "xhtml", "trace", "rough",
        "blade", "robin", "strap", "cloud", "knife", "shelf", "adopt", "outer", "islam", "cited",

        "chase", "sauce", "proxy", "slave", "zdnet", "haven", "charm", "basin", "ranch", "toner",
        "latex", "delhi", "alien", "nepal", "rocky", "omega", "saver", "grain", "salon", "turbo",
        "aimed", "brush", "spare", "skirt", "honey", "faced", "sixth", "cheat", "sandy", "macro"
      ];
      const WORD_SET = new Set(WORD_LIST);

      const dom = {
        baseUrl: document.getElementById("baseUrl"),
        apiKey: document.getElementById("apiKey"),
        model: document.getElementById("model"),
        temperature: document.getElementById("temperature"),
        maxTokens: document.getElementById("maxTokens"),
        maxAttempts: document.getElementById("maxAttempts"),
        processingMode: document.getElementById("processingMode"),
        requestBuildMode: document.getElementById("requestBuildMode"),
        autoNext: document.getElementById("autoNext"),
        autoDelay: document.getElementById("autoDelay"),
        streamMaxLines: document.getElementById("streamMaxLines"),
        startBtn: document.getElementById("startBtn"),
        stopBtn: document.getElementById("stopBtn"),
        saveBtn: document.getElementById("saveBtn"),
        themeToggle: document.getElementById("themeToggle"),
        status: document.getElementById("status"),
        stats: document.getElementById("stats"),
        board: document.getElementById("board"),
        streamLog: document.getElementById("streamLog"),
        attempts: document.getElementById("attempts")
      };

      const state = {
        running: false,
        secret: "",
        messages: [],
        lastFeedbackUserMessage: "",
        attemptCount: 0,
        maxAttempts: DEFAULT_MAX_ATTEMPTS,
        triedGuesses: [],
        feedbackFacts: {
          confirmedPositions: Array(5).fill(null),
          presentNotPositionsByLetter: {},
          absentLetters: new Set(),
          positiveLetters: new Set()
        },
        gameUsage: {
          cachedInput: 0,
          input: 0,
          output: 0,
          hasUsage: false
        },
        abortController: null,
        currentReader: null,
        stopRequested: false,
        stopWaiters: new Set(),
        autoNextTimer: null,
        themeOverride: null,
        systemPrefersDark: false,
        stats: {
          games: 0,
          wins: 0,
          losses: 0,
          correctGuesses: 0,
          wrongGuesses: 0
        }
      };

      function setStatus(text) {
        dom.status.textContent = text;
      }

      function appendLog(text) {
        dom.streamLog.textContent += text;
        const maxLines = parseStreamMaxLines(dom.streamMaxLines.value);
        const lines = dom.streamLog.textContent.split("\n");
        if (lines.length > maxLines) {
          dom.streamLog.textContent = lines.slice(lines.length - maxLines).join("\n");
        }
        dom.streamLog.scrollTop = dom.streamLog.scrollHeight;
      }

      function showUiError(rawMessage) {
        const message = String(rawMessage || "Unknown error");
        setStatus(`Error: ${message}`);
        appendLog(`\n[Error] ${message}\n`);
      }

      function renderStats() {
        dom.stats.textContent =
          `History: games ${state.stats.games} | wins ${state.stats.wins} | losses ${state.stats.losses} | correct guesses ${state.stats.correctGuesses} | wrong guesses ${state.stats.wrongGuesses}`;
      }

      function saveStats() {
        localStorage.setItem(STATS_STORAGE_KEY, JSON.stringify(state.stats));
        renderStats();
      }

      function loadStats() {
        const raw = localStorage.getItem(STATS_STORAGE_KEY);
        if (!raw) {
          renderStats();
          return;
        }
        try {
          const parsed = JSON.parse(raw);
          state.stats = {
            games: Number(parsed.games) || 0,
            wins: Number(parsed.wins) || 0,
            losses: Number(parsed.losses) || 0,
            correctGuesses: Number(parsed.correctGuesses) || 0,
            wrongGuesses: Number(parsed.wrongGuesses) || 0
          };
        } catch (_err) {
          state.stats = {
            games: 0,
            wins: 0,
            losses: 0,
            correctGuesses: 0,
            wrongGuesses: 0
          };
        }
        renderStats();
      }

      function loadThemeOverride() {
        const raw = localStorage.getItem(THEME_STORAGE_KEY);
        if (raw === "dark" || raw === "light") {
          return raw;
        }
        return null;
      }

      function saveThemeOverride() {
        if (state.themeOverride === "dark" || state.themeOverride === "light") {
          localStorage.setItem(THEME_STORAGE_KEY, state.themeOverride);
          return;
        }
        localStorage.removeItem(THEME_STORAGE_KEY);
      }

      function isDarkThemeActive() {
        if (state.themeOverride === "dark") return true;
        if (state.themeOverride === "light") return false;
        return state.systemPrefersDark;
      }

      function updateThemeToggleLabel() {
        if (!dom.themeToggle) return;
        const darkActive = isDarkThemeActive();
        if (state.themeOverride) {
          dom.themeToggle.textContent = darkActive ? "Theme: Dark (Manual)" : "Theme: Light (Manual)";
        } else {
          dom.themeToggle.textContent = darkActive ? "Theme: System (Dark)" : "Theme: System (Light)";
        }
        dom.themeToggle.setAttribute("aria-pressed", String(darkActive));
      }

      function applyTheme() {
        document.documentElement.setAttribute("data-theme", isDarkThemeActive() ? "dark" : "light");
        updateThemeToggleLabel();
      }

      function initTheme() {
        const mediaQuery = window.matchMedia("(prefers-color-scheme: dark)");
        state.systemPrefersDark = mediaQuery.matches;
        state.themeOverride = loadThemeOverride();
        applyTheme();
        const onThemeChange = (event) => {
          state.systemPrefersDark = event.matches;
          if (!state.themeOverride) {
            applyTheme();
          }
        };
        if (typeof mediaQuery.addEventListener === "function") {
          mediaQuery.addEventListener("change", onThemeChange);
        } else if (typeof mediaQuery.addListener === "function") {
          mediaQuery.addListener(onThemeChange);
        }
      }

      function toggleThemeOverride() {
        state.themeOverride = isDarkThemeActive() ? "light" : "dark";
        saveThemeOverride();
        applyTheme();
      }

      function clearAutoNextTimer() {
        if (state.autoNextTimer !== null) {
          clearTimeout(state.autoNextTimer);
          state.autoNextTimer = null;
        }
      }

      function makeAbortError() {
        try {
          return new DOMException("Stopped by user.", "AbortError");
        } catch (_err) {
          const err = new Error("Stopped by user.");
          err.name = "AbortError";
          return err;
        }
      }

      function notifyStopWaiters() {
        const waiters = Array.from(state.stopWaiters);
        state.stopWaiters.clear();
        waiters.forEach((rejecter) => {
          try {
            rejecter(makeAbortError());
          } catch (_err) {
          }
        });
      }

      function raceWithStop(promise) {
        if (state.stopRequested) {
          return Promise.reject(makeAbortError());
        }
        return new Promise((resolve, reject) => {
          const onStop = (abortErr) => reject(abortErr || makeAbortError());
          state.stopWaiters.add(onStop);
          promise.then(
            (value) => {
              state.stopWaiters.delete(onStop);
              resolve(value);
            },
            (error) => {
              state.stopWaiters.delete(onStop);
              reject(error);
            }
          );
        });
      }

      function parseAutoDelaySeconds(raw) {
        const n = Number(raw);
        if (!Number.isFinite(n)) return 3;
        return Math.max(0, Math.min(60, Math.round(n)));
      }

      function scheduleAutoNext() {
        clearAutoNextTimer();
        if (!dom.autoNext.checked) return;
        const delaySeconds = parseAutoDelaySeconds(dom.autoDelay.value);
        appendLog(`[Auto Next] Starting next game in ${delaySeconds}s...\n`);
        state.autoNextTimer = setTimeout(() => {
          state.autoNextTimer = null;
          if (!state.running) {
            runGame({ autoTriggered: true });
          }
        }, delaySeconds * 1000);
      }

      function saveConfig() {
        const config = {
          baseUrl: dom.baseUrl.value.trim(),
          apiKey: dom.apiKey.value.trim(),
          model: dom.model.value.trim(),
          temperature: dom.temperature.value.trim(),
          maxTokens: dom.maxTokens.value.trim(),
          maxAttempts: dom.maxAttempts.value.trim(),
          processingMode: normalizeProcessingMode(dom.processingMode.value),
          requestBuildMode: normalizeRequestBuildMode(dom.requestBuildMode.value),
          autoNext: dom.autoNext.checked,
          autoDelay: dom.autoDelay.value.trim(),
          streamMaxLines: dom.streamMaxLines.value.trim()
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
        setStatus("Config saved.");
      }

      function loadConfig() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          dom.baseUrl.value = "https://api.openai.com/v1";
          dom.model.value = "gpt-4.1-mini";
          dom.temperature.value = "0.4";
          dom.maxTokens.value = String(DEFAULT_MAX_TOKENS);
          dom.maxAttempts.value = String(DEFAULT_MAX_ATTEMPTS);
          dom.processingMode.value = PROCESSING_MODE_TOOL_CALL;
          dom.requestBuildMode.value = REQUEST_BUILD_MODE_CUMULATIVE;
          dom.autoNext.checked = false;
          dom.autoDelay.value = "3";
          dom.streamMaxLines.value = String(DEFAULT_STREAM_MAX_LINES);
          return;
        }
        try {
          const config = JSON.parse(raw);
          dom.baseUrl.value = config.baseUrl || "https://api.openai.com/v1";
          dom.apiKey.value = config.apiKey || "";
          dom.model.value = config.model || "gpt-4.1-mini";
          dom.temperature.value = String(config.temperature || "0.4");
          dom.maxTokens.value = String(config.maxTokens || DEFAULT_MAX_TOKENS);
          dom.maxAttempts.value = String(parseMaxAttempts(config.maxAttempts));
          dom.processingMode.value = normalizeProcessingMode(config.processingMode);
          dom.requestBuildMode.value = normalizeRequestBuildMode(config.requestBuildMode);
          dom.autoNext.checked = Boolean(config.autoNext);
          dom.autoDelay.value = String(config.autoDelay || "3");
          dom.streamMaxLines.value = String(parseStreamMaxLines(config.streamMaxLines));
        } catch (_err) {
          dom.baseUrl.value = "https://api.openai.com/v1";
          dom.model.value = "gpt-4.1-mini";
          dom.temperature.value = "0.4";
          dom.maxTokens.value = String(DEFAULT_MAX_TOKENS);
          dom.maxAttempts.value = String(DEFAULT_MAX_ATTEMPTS);
          dom.processingMode.value = PROCESSING_MODE_TOOL_CALL;
          dom.requestBuildMode.value = REQUEST_BUILD_MODE_CUMULATIVE;
          dom.autoNext.checked = false;
          dom.autoDelay.value = "3";
          dom.streamMaxLines.value = String(DEFAULT_STREAM_MAX_LINES);
        }
      }

      function normalizeProcessingMode(rawMode) {
        return rawMode === PROCESSING_MODE_RESPONSE_PARSING
          ? PROCESSING_MODE_RESPONSE_PARSING
          : PROCESSING_MODE_TOOL_CALL;
      }

      function normalizeRequestBuildMode(rawMode) {
        return rawMode === REQUEST_BUILD_MODE_LAST_RECORD
          ? REQUEST_BUILD_MODE_LAST_RECORD
          : REQUEST_BUILD_MODE_CUMULATIVE;
      }

      function normalizeEndpoint(baseUrl) {
        const cleaned = baseUrl.replace(/\/+$/, "");
        if (cleaned.endsWith("/chat/completions")) {
          return cleaned;
        }
        if (cleaned.endsWith("/v1")) {
          return `${cleaned}/chat/completions`;
        }
        return `${cleaned}/v1/chat/completions`;
      }

      function randomSecretWord() {
        const index = Math.floor(Math.random() * WORD_LIST.length);
        return WORD_LIST[index];
      }

      function createBoard(maxAttempts = DEFAULT_MAX_ATTEMPTS) {
        const rowCount = parseMaxAttempts(maxAttempts);
        dom.board.innerHTML = "";
        for (let i = 0; i < rowCount; i += 1) {
          const row = document.createElement("div");
          row.className = "row";
          for (let j = 0; j < 5; j += 1) {
            const tile = document.createElement("div");
            tile.className = "tile";
            row.appendChild(tile);
          }
          dom.board.appendChild(row);
        }
      }

      function markRow(turn, guess, statuses) {
        const row = dom.board.children[turn - 1];
        if (!row) return;
        for (let i = 0; i < 5; i += 1) {
          const tile = row.children[i];
          tile.textContent = guess[i] || "";
          tile.classList.add(statuses[i]);
        }
      }

      function formatMs(ms) {
        if (typeof ms !== "number" || Number.isNaN(ms)) return "n/a";
        return `${Math.max(0, Math.round(ms))} ms`;
      }

      function formatTiming(timing) {
        if (!timing) return "TTFT: n/a | Total: n/a";
        return `TTFT: ${formatMs(timing.ttftMs)} | Total: ${formatMs(timing.totalMs)}`;
      }

      function toTokenNumber(value) {
        const n = Number(value);
        if (!Number.isFinite(n)) return null;
        return Math.max(0, Math.round(n));
      }

      function createEmptyUsage() {
        return {
          cachedInput: 0,
          input: 0,
          output: 0,
          hasUsage: false
        };
      }

      function normalizeUsage(rawUsage) {
        if (!rawUsage || typeof rawUsage !== "object") return null;
        const promptTokens = toTokenNumber(rawUsage.prompt_tokens ?? rawUsage.input_tokens);
        const completionTokens = toTokenNumber(rawUsage.completion_tokens ?? rawUsage.output_tokens);
        const cachedFromPromptDetails = toTokenNumber(
          rawUsage.prompt_tokens_details && rawUsage.prompt_tokens_details.cached_tokens
        );
        const cachedFromInputDetails = toTokenNumber(
          rawUsage.input_tokens_details && rawUsage.input_tokens_details.cached_tokens
        );
        const cachedFromHit = toTokenNumber(rawUsage.prompt_cache_hit_tokens);
        const promptMissTokens = toTokenNumber(rawUsage.prompt_cache_miss_tokens);
        const cachedInputRaw = cachedFromPromptDetails ?? cachedFromInputDetails ?? cachedFromHit;
        const cachedInput = cachedInputRaw ?? 0;

        let input = 0;
        if (promptMissTokens !== null) {
          input = promptMissTokens;
        } else if (promptTokens !== null) {
          input = Math.max(0, promptTokens - cachedInput);
        }

        const output = completionTokens ?? 0;
        const hasUsage =
          promptTokens !== null ||
          completionTokens !== null ||
          cachedInputRaw !== null ||
          promptMissTokens !== null;
        if (!hasUsage) return null;

        return {
          cachedInput,
          input,
          output,
          hasUsage: true
        };
      }

      function addUsageTotals(target, usage) {
        if (!target || !usage || !usage.hasUsage) return;
        target.cachedInput += usage.cachedInput;
        target.input += usage.input;
        target.output += usage.output;
        target.hasUsage = true;
      }

      function cloneUsage(usage) {
        if (!usage) return null;
        return {
          cachedInput: usage.cachedInput,
          input: usage.input,
          output: usage.output,
          hasUsage: Boolean(usage.hasUsage)
        };
      }

      function formatUsage(usage) {
        if (!usage || !usage.hasUsage) {
          return "cached input n/a | input n/a | output n/a";
        }
        return `cached input ${usage.cachedInput} | input ${usage.input} | output ${usage.output}`;
      }

      function patternToEmoji(pattern) {
        return String(pattern || "")
          .split("")
          .map((ch) => (ch === "G" ? "🟩" : ch === "Y" ? "🟨" : ch === "B" ? "⬛" : ch))
          .join("");
      }

      function createEmptyFeedbackFacts() {
        return {
          confirmedPositions: Array(5).fill(null),
          presentNotPositionsByLetter: {},
          absentLetters: new Set(),
          positiveLetters: new Set()
        };
      }

      function getFeedbackFactsSnapshot() {
        const confirmedPositions = state.feedbackFacts.confirmedPositions
          .map((letter, index) => (letter ? { letter, index: index + 1 } : null))
          .filter(Boolean);
        const confirmedPresentNotPositions = Object.keys(state.feedbackFacts.presentNotPositionsByLetter)
          .sort()
          .map((letter) => ({
            letter,
            not_indexes: Array.from(state.feedbackFacts.presentNotPositionsByLetter[letter])
              .sort((a, b) => a - b)
              .map((index) => index + 1)
          }))
          .filter((item) => item.not_indexes.length > 0);
        const confirmedAbsentLetters = Array.from(state.feedbackFacts.absentLetters).sort();
        return {
          index_base: 1,
          confirmed_positions: confirmedPositions,
          confirmed_present_not_positions: confirmedPresentNotPositions,
          confirmed_absent_letters: confirmedAbsentLetters
        };
      }

      function updateFeedbackFacts(guess, statuses) {
        const absentCandidates = new Set();
        for (let i = 0; i < 5; i += 1) {
          const letter = guess[i];
          const status = statuses[i];
          if (status === "correct") {
            state.feedbackFacts.confirmedPositions[i] = letter;
            state.feedbackFacts.positiveLetters.add(letter);
            state.feedbackFacts.absentLetters.delete(letter);
            continue;
          }
          if (status === "present") {
            state.feedbackFacts.positiveLetters.add(letter);
            state.feedbackFacts.absentLetters.delete(letter);
            if (!state.feedbackFacts.presentNotPositionsByLetter[letter]) {
              state.feedbackFacts.presentNotPositionsByLetter[letter] = new Set();
            }
            state.feedbackFacts.presentNotPositionsByLetter[letter].add(i);
            continue;
          }
          if (status === "absent") {
            absentCandidates.add(letter);
          }
        }

        absentCandidates.forEach((letter) => {
          if (state.feedbackFacts.positiveLetters.has(letter)) {
            state.feedbackFacts.absentLetters.delete(letter);
            return;
          }
          state.feedbackFacts.absentLetters.add(letter);
        });
      }

      function historySummaryText() {
        return `Correct ${state.stats.correctGuesses} | Wrong ${state.stats.wrongGuesses}`;
      }

      function guessHistorySnapshot() {
        return state.triedGuesses.slice();
      }

      function parseTemperature(raw) {
        const n = Number(raw);
        if (!Number.isFinite(n)) return 0.4;
        return Math.min(2, Math.max(0, n));
      }

      function parseMaxTokens(raw) {
        const n = Number(raw);
        if (!Number.isFinite(n)) return DEFAULT_MAX_TOKENS;
        return Math.max(1, Math.round(n));
      }

      function parseMaxAttempts(raw) {
        const n = Number(raw);
        if (!Number.isFinite(n)) return DEFAULT_MAX_ATTEMPTS;
        return Math.max(1, Math.min(20, Math.round(n)));
      }

      function parseStreamMaxLines(raw) {
        const n = Number(raw);
        if (!Number.isFinite(n)) return DEFAULT_STREAM_MAX_LINES;
        return Math.max(50, Math.min(5000, Math.round(n)));
      }

      function renderAttempt(turn, guess, reason, pattern, valid, timing, historySummary, tokenUsage, attemptUsed = true) {
        const li = document.createElement("li");
        const title = document.createElement("div");
        title.className = "attempt-title";
        const patternDisplay = valid ? patternToEmoji(pattern) : pattern;
        title.textContent = attemptUsed
          ? `Turn ${turn}: ${guess.toUpperCase()} (${patternDisplay})`
          : `Turn ${turn}: ${guess.toUpperCase()} (${patternDisplay}, no attempt used)`;
        const meta = document.createElement("p");
        meta.className = "attempt-meta";
        meta.textContent = `${valid ? "Reason" : "Rejected"}: ${reason || "(empty)"}`;
        const timingMeta = document.createElement("p");
        timingMeta.className = "attempt-meta";
        timingMeta.textContent = `Timing: ${formatTiming(timing)}`;
        const historyMeta = document.createElement("p");
        historyMeta.className = "attempt-meta";
        historyMeta.textContent = `History Count: ${historySummary}`;
        li.append(title, meta, timingMeta);
        if (tokenUsage && tokenUsage.turn && tokenUsage.game) {
          const usageMeta = document.createElement("p");
          usageMeta.className = "attempt-meta";
          usageMeta.textContent = `Token Usage: Turn ${formatUsage(tokenUsage.turn)} | Game ${formatUsage(tokenUsage.game)}`;
          li.appendChild(usageMeta);
        }
        li.appendChild(historyMeta);
        dom.attempts.appendChild(li);
      }

      function evaluateGuess(secret, guess) {
        const statuses = Array(5).fill("absent");
        const remaining = {};

        for (let i = 0; i < 5; i += 1) {
          if (guess[i] === secret[i]) {
            statuses[i] = "correct";
          } else {
            const letter = secret[i];
            remaining[letter] = (remaining[letter] || 0) + 1;
          }
        }

        for (let i = 0; i < 5; i += 1) {
          if (statuses[i] === "correct") continue;
          const letter = guess[i];
          if (remaining[letter] > 0) {
            statuses[i] = "present";
            remaining[letter] -= 1;
          }
        }

        const pattern = statuses
          .map((status) => (status === "correct" ? "G" : status === "present" ? "Y" : "B"))
          .join("");

        return { statuses, pattern };
      }

      function safeJsonParse(text) {
        try {
          return JSON.parse(text);
        } catch (_err) {
          return null;
        }
      }

      function cleanGuess(raw) {
        return String(raw || "")
          .toLowerCase()
          .replace(/[^a-z]/g, "")
          .slice(0, 5);
      }

      function classifyTurnFailure(rawMessage) {
        const message = String(rawMessage || "").toLowerCase();
        if (message.includes("no submit_guess tool call")) {
          return "missing_tool_call";
        }
        if (message.includes("tool call arguments are not valid json")) {
          return "invalid_tool_json";
        }
        if (message.includes("tool returned invalid guess length")) {
          return "invalid_guess_length";
        }
        if (message.includes("no <wordle_choice> block found")) {
          return "missing_wordle_choice";
        }
        if (message.includes("response parsing extracted invalid guess length")) {
          return "invalid_guess_length";
        }
        return null;
      }

      function buildRetryUserMessage(failure, processingMode) {
        if (!failure || !failure.type) return "";
        if (processingMode === PROCESSING_MODE_TOOL_CALL && failure.type === "max_tokens_without_tool_call") {
          return `Previous turn failed because response was too long and reached max_tokens=${failure.maxTokens} (finish_reason=${failure.finishReason}) before submit_guess tool call. Keep reasoning short and call submit_guess exactly once with valid JSON key order {"reason":"...","guess":"....."} where guess is 5 lowercase letters.`;
        }
        if (processingMode === PROCESSING_MODE_TOOL_CALL && failure.type === "missing_tool_call") {
          return "Previous turn failed because no submit_guess tool call was emitted. In this turn, call submit_guess exactly once with valid JSON key order {\"reason\":\"...\",\"guess\":\".....\"}, and keep guess to 5 lowercase letters.";
        }
        if (processingMode === PROCESSING_MODE_TOOL_CALL && failure.type === "invalid_tool_json") {
          return "Previous turn failed because submit_guess arguments were not valid JSON. In this turn, call submit_guess exactly once with strict JSON key order {\"reason\":\"...\",\"guess\":\".....\"}.";
        }
        if (processingMode === PROCESSING_MODE_RESPONSE_PARSING && failure.type === "missing_wordle_choice") {
          return "Previous turn failed because output had no <wordle_choice><reason></reason><guess></guess></wordle_choice> block. In this turn, include exactly one such block and keep guess to 5 lowercase letters.";
        }
        if (failure.type === "invalid_guess_length") {
          if (processingMode === PROCESSING_MODE_RESPONSE_PARSING) {
            return "Previous turn failed because parsed guess was not exactly 5 lowercase letters. In this turn, output exactly one <wordle_choice> block and keep <guess> as a 5-letter lowercase word.";
          }
          return "Previous turn failed because submit_guess.guess was not exactly 5 lowercase letters. In this turn, call submit_guess exactly once and ensure guess is a 5-letter lowercase word.";
        }
        return "";
      }

      function getSystemPromptByMode(processingMode) {
        if (processingMode === PROCESSING_MODE_RESPONSE_PARSING) {
          return "You are a Wordle solver. Think in short plain text while streaming. At the end of every turn, output exactly one XML block in this structure: <wordle_choice><reason>...</reason><guess>.....</guess></wordle_choice>. reason must appear before guess. guess must be a 5-letter lowercase English word. Do not output tool calls. Follow Wordle rules strictly: G means exact position is fixed; Y means the letter is in the word but not in that position; B means no unmatched copy remains for that guess after applying G/Y counts. Repeated letters are allowed, and a letter can appear multiple times in the secret. Never reject a candidate only because it repeats a letter. If one candidate fits all known constraints, guess it.";
        }
        return "You are a Wordle solver. Think in short plain text while streaming, then call tool submit_guess exactly once per turn with JSON key order {\"reason\":\"...\",\"guess\":\"...\"}. Reason must be emitted before guess. Guess must be a 5-letter lowercase English word. Follow Wordle rules strictly: G means exact position is fixed; Y means the letter is in the word but not in that position; B means no unmatched copy remains for that guess after applying G/Y counts. Repeated letters are allowed, and a letter can appear multiple times in the secret. Never reject a candidate only because it repeats a letter. If one candidate fits all known constraints, guess it.";
      }

      function getGameStartPromptByMode(processingMode, maxAttempts) {
        if (processingMode === PROCESSING_MODE_RESPONSE_PARSING) {
          return `Game starts now. You have ${maxAttempts} turns. Guess common English 5-letter words. In each turn, include exactly one <wordle_choice><reason></reason><guess></guess></wordle_choice> block. After each user feedback message, update your hypothesis and output the next block. Never repeat a guess that already appears in guess_history.`;
        }
        return `Game starts now. You have ${maxAttempts} turns. Guess common English 5-letter words. For every tool call, output reason first and guess second. After each tool response, update your hypothesis and call submit_guess again. Tool response includes guess_history. Never repeat a guess that already appears in guess_history.`;
      }

      function buildInitialMessages(processingMode, maxAttempts) {
        const mode = normalizeProcessingMode(processingMode);
        const sanitizedMaxAttempts = parseMaxAttempts(maxAttempts);
        return [
          {
            role: "system",
            content: getSystemPromptByMode(mode)
          },
          {
            role: "user",
            content: getGameStartPromptByMode(mode, sanitizedMaxAttempts)
          }
        ];
      }

      function buildToolSpec() {
        return [
          {
            type: "function",
            function: {
              name: "submit_guess",
              description: "Submit one Wordle guess and a concise reason.",
              parameters: {
                type: "object",
                properties: {
                  reason: {
                    type: "string",
                    description: "Why this guess is selected right now. Must appear before guess in JSON."
                  },
                  guess: {
                    type: "string",
                    description: "One lowercase 5-letter common English word."
                  }
                },
                required: ["reason", "guess"],
                additionalProperties: false
              }
            }
          }
        ];
      }

      function parseGuessFromToolCalls(toolCalls, maxTokens, finishReason, usage) {
        const call = toolCalls.find((item) => item && item.function && item.function.name === "submit_guess");
        if (!call) {
          const hitMaxTokens = finishReason === "length" || Boolean(usage && usage.output >= maxTokens);
          if (hitMaxTokens) {
            return {
              retryableNoToolCall: true,
              maxTokens,
              finishReason: finishReason || "unknown"
            };
          }
          throw new Error("No submit_guess tool call received.");
        }

        const parsed = safeJsonParse(call.function.arguments);
        if (!parsed) {
          throw new Error(`Tool call arguments are not valid JSON: ${call.function.arguments}`);
        }

        const guess = cleanGuess(parsed.guess);
        const reason = String(parsed.reason || "").trim();
        if (guess.length !== 5) {
          throw new Error(`Tool returned invalid guess length: ${guess}`);
        }
        return { guess, reason, toolCall: call };
      }

      function parseGuessFromResponseText(rawText) {
        const text = String(rawText || "");
        const match = text.match(
          /<wordle_choice>\s*<reason>([\s\S]*?)<\/reason>\s*<guess>([\s\S]*?)<\/guess>\s*<\/wordle_choice>/i
        );
        if (!match) {
          throw new Error("No <wordle_choice> block found in response.");
        }
        const reason = String(match[1] || "").trim();
        const guess = cleanGuess(match[2]);
        if (guess.length !== 5) {
          throw new Error(`Response parsing extracted invalid guess length: ${guess}`);
        }
        return { guess, reason };
      }

      function isLikelyToolUnsupportedMessage(rawMessage) {
        const message = String(rawMessage || "").toLowerCase();
        return (
          message.includes("does not support this tool_choice") ||
          message.includes("does not support tool_choice") ||
          message.includes("does not support tools") ||
          message.includes("tools are not supported") ||
          message.includes("unsupported parameter: tools") ||
          message.includes("unsupported parameter: tool_choice") ||
          message.includes("unrecognized request argument supplied: tools") ||
          message.includes("unrecognized request argument supplied: tool_choice") ||
          message.includes("function call is not supported") ||
          message.includes("function calling is not supported")
        );
      }

      function buildResponseFeedbackMessage(feedback, processingMode) {
        const mode = normalizeProcessingMode(processingMode);
        if (mode === PROCESSING_MODE_RESPONSE_PARSING) {
          return `Wordle feedback: ${JSON.stringify(feedback)}\nContinue reasoning, then output exactly one <wordle_choice><reason></reason><guess></guess></wordle_choice> block.`;
        }
        return JSON.stringify(feedback);
      }

      function pushAssistantTurnMessage(turnResult, processingMode) {
        const mode = normalizeProcessingMode(processingMode);
        if (mode === PROCESSING_MODE_TOOL_CALL) {
          state.messages.push({
            role: "assistant",
            content: turnResult.thought,
            tool_calls: [
              {
                id: turnResult.toolCall.id,
                type: "function",
                function: {
                  name: "submit_guess",
                  arguments: turnResult.toolCall.function.arguments
                }
              }
            ]
          });
          return;
        }
        state.messages.push({
          role: "assistant",
          content: turnResult.assistantText || turnResult.thought || ""
        });
      }

      function pushFeedbackMessage(turnResult, processingMode, feedbackPayload) {
        const mode = normalizeProcessingMode(processingMode);
        let userMessageContent = "";
        if (mode === PROCESSING_MODE_TOOL_CALL) {
          userMessageContent = JSON.stringify(feedbackPayload);
          state.messages.push({
            role: "tool",
            tool_call_id: turnResult.toolCall.id,
            content: userMessageContent
          });
        } else {
          userMessageContent = buildResponseFeedbackMessage(feedbackPayload, mode);
          state.messages.push({
            role: "user",
            content: userMessageContent
          });
        }
        state.lastFeedbackUserMessage = userMessageContent;
      }

      function buildRequestMessages(processingMode, requestBuildMode) {
        const mode = normalizeProcessingMode(processingMode);
        const buildMode = normalizeRequestBuildMode(requestBuildMode);
        if (buildMode === REQUEST_BUILD_MODE_CUMULATIVE) {
          return state.messages;
        }
        const messages = [
          {
            role: "system",
            content: getSystemPromptByMode(mode)
          }
        ];
        const userMessageContent = state.lastFeedbackUserMessage || getGameStartPromptByMode(mode);
        messages.push({
          role: "user",
          content: userMessageContent
        });
        return messages;
      }

      async function streamOneTurn(config, processingMode, requestBuildMode) {
        const mode = normalizeProcessingMode(processingMode);
        const buildMode = normalizeRequestBuildMode(requestBuildMode);
        const requestStart = performance.now();
        const endpoint = normalizeEndpoint(config.baseUrl);
        const maxTokens = parseMaxTokens(config.maxTokens);
        const requestMessages = buildRequestMessages(mode, buildMode);
        const payload = {
          model: config.model,
          stream: true,
          temperature: parseTemperature(config.temperature),
          max_tokens: maxTokens,
          messages: requestMessages
        };
        if (mode === PROCESSING_MODE_TOOL_CALL) {
          payload.tools = buildToolSpec();
          payload.tool_choice = {
            type: "function",
            function: {
              name: "submit_guess"
            }
          };
        }
        // Defensive guard: never allow empty stop sequences to be sent.
        if (Object.prototype.hasOwnProperty.call(payload, "stop")) {
          delete payload.stop;
        }
        appendLog(
          `[Request] mode=${mode} requestBuild=${buildMode} msgCount=${requestMessages.length} hasTools=${Array.isArray(payload.tools)} hasToolChoice=${Boolean(payload.tool_choice)} hasStop=${Object.prototype.hasOwnProperty.call(payload, "stop")}\n`
        );

        const headers = {
          "Content-Type": "application/json",
          Authorization: `Bearer ${config.apiKey}`
        };

        state.abortController = new AbortController();
        state.currentReader = null;
        try {
          const res = await raceWithStop(fetch(endpoint, {
            method: "POST",
            headers,
            body: JSON.stringify(payload),
            signal: state.abortController.signal
          }));

          if (!res.ok) {
            const text = await res.text();
            const err = new Error(`LLM request failed (${res.status}): ${text.slice(0, 280)}`);
            err.httpStatus = res.status;
            err.responseText = text;
            throw err;
          }
          if (!res.body) {
            throw new Error("No response stream body returned by endpoint.");
          }

          const toolCalls = [];
          let contentSoFar = "";
          let reasoningSoFar = "";
          let toolStreamStarted = false;
          let firstTokenAt = null;
          let usage = null;
          let finishReason = null;
          const decoder = new TextDecoder();
          const reader = res.body.getReader();
          state.currentReader = reader;
          let buffer = "";
          let done = false;
          const markFirstToken = () => {
            if (firstTokenAt === null) {
              firstTokenAt = performance.now();
            }
          };

          while (!done) {
            const chunk = await raceWithStop(reader.read());
            if (chunk.done) break;
            buffer += decoder.decode(chunk.value, { stream: true });

            let lineBreak = buffer.indexOf("\n");
            while (lineBreak !== -1) {
              const line = buffer.slice(0, lineBreak).trim();
              buffer = buffer.slice(lineBreak + 1);

              if (line.startsWith("data:")) {
                const data = line.slice(5).trim();
                if (data === "[DONE]") {
                  done = true;
                  break;
                }
                if (data) {
                  const packet = safeJsonParse(data);
                  if (
                    packet &&
                    Array.isArray(packet.choices) &&
                    packet.choices[0] &&
                    typeof packet.choices[0].finish_reason === "string"
                  ) {
                    finishReason = packet.choices[0].finish_reason;
                  }
                  const delta = packet && packet.choices && packet.choices[0] && packet.choices[0].delta;
                  if (delta && typeof delta.content === "string" && delta.content.length > 0) {
                    markFirstToken();
                    contentSoFar += delta.content;
                    appendLog(delta.content);
                  }
                  if (delta && typeof delta.reasoning_content === "string" && delta.reasoning_content.length > 0) {
                    markFirstToken();
                    reasoningSoFar += delta.reasoning_content;
                    appendLog(delta.reasoning_content);
                  }
                  if (delta && typeof delta.reasoning === "string" && delta.reasoning.length > 0) {
                    markFirstToken();
                    reasoningSoFar += delta.reasoning;
                    appendLog(delta.reasoning);
                  }
                  if (delta && Array.isArray(delta.tool_calls)) {
                    delta.tool_calls.forEach((item) => {
                      const idx = item.index || 0;
                      if (!toolCalls[idx]) {
                        toolCalls[idx] = {
                          id: "",
                          type: "function",
                          function: {
                            name: "",
                            arguments: ""
                          }
                        };
                      }
                      if (item.id) toolCalls[idx].id = item.id;
                      if (item.function && item.function.name) {
                        toolCalls[idx].function.name = item.function.name;
                      }
                      if (item.function && typeof item.function.arguments === "string") {
                        toolCalls[idx].function.arguments += item.function.arguments;
                        if (!toolStreamStarted) {
                          appendLog("\n[Tool arguments stream]\n");
                          toolStreamStarted = true;
                        }
                        if (item.function.arguments.length > 0) {
                          markFirstToken();
                        }
                        appendLog(item.function.arguments);
                      }
                    });
                  }
                  if (packet && packet.usage) {
                    const usageCandidate = normalizeUsage(packet.usage);
                    if (usageCandidate) {
                      usage = usageCandidate;
                    }
                  }
                }
              }

              lineBreak = buffer.indexOf("\n");
            }
          }

          if (toolStreamStarted) {
            appendLog("\n");
          }

          const thoughtCombined = [reasoningSoFar, contentSoFar].filter(Boolean).join("\n");
          const totalMs = performance.now() - requestStart;
          let parsedChoice = null;
          if (mode === PROCESSING_MODE_TOOL_CALL) {
            parsedChoice = parseGuessFromToolCalls(toolCalls, maxTokens, finishReason, usage);
            if (parsedChoice.retryableNoToolCall) {
              return {
                retryableNoToolCall: true,
                reason: "Reached max tokens without receiving submit_guess tool call.",
                maxTokens: parsedChoice.maxTokens,
                finishReason: parsedChoice.finishReason,
                timing: {
                  ttftMs: firstTokenAt === null ? null : firstTokenAt - requestStart,
                  totalMs
                },
                usage
              };
            }
          } else {
            parsedChoice = parseGuessFromResponseText(contentSoFar || thoughtCombined);
          }

          return {
            guess: parsedChoice.guess,
            reason: parsedChoice.reason,
            thought: thoughtCombined,
            assistantText: contentSoFar,
            toolCall: parsedChoice.toolCall || null,
            timing: {
              ttftMs: firstTokenAt === null ? null : firstTokenAt - requestStart,
              totalMs
            },
            usage
          };
        } finally {
          state.currentReader = null;
          state.abortController = null;
        }
      }

      async function runGame(options = {}) {
        const autoTriggered = Boolean(options.autoTriggered);
        clearAutoNextTimer();
        const config = {
          baseUrl: dom.baseUrl.value.trim(),
          apiKey: dom.apiKey.value.trim(),
          model: dom.model.value.trim(),
          temperature: dom.temperature.value.trim(),
          maxTokens: dom.maxTokens.value.trim(),
          maxAttempts: dom.maxAttempts.value.trim(),
          processingMode: normalizeProcessingMode(dom.processingMode.value),
          requestBuildMode: normalizeRequestBuildMode(dom.requestBuildMode.value),
          autoNext: dom.autoNext.checked,
          autoDelay: dom.autoDelay.value.trim(),
          streamMaxLines: dom.streamMaxLines.value.trim()
        };

        if (!config.baseUrl || !config.apiKey || !config.model) {
          setStatus("Please fill base URL, API key, and model.");
          return;
        }

        localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
        dom.startBtn.disabled = true;
        dom.stopBtn.disabled = false;
        dom.saveBtn.disabled = true;
        dom.attempts.innerHTML = "";
        if (autoTriggered) {
          appendLog("\n\n===== Auto Next Game =====\n");
        } else {
          dom.streamLog.textContent = "";
        }
        const maxAttempts = parseMaxAttempts(config.maxAttempts);
        state.maxAttempts = maxAttempts;
        dom.maxAttempts.value = String(maxAttempts);
        createBoard(maxAttempts);

        state.running = true;
        state.stopRequested = false;
        state.stopWaiters.clear();
        state.secret = randomSecretWord();
        state.messages = buildInitialMessages(config.processingMode, state.maxAttempts);
        state.lastFeedbackUserMessage = "";
        state.attemptCount = 0;
        state.triedGuesses = [];
        state.feedbackFacts = createEmptyFeedbackFacts();
        state.gameUsage = createEmptyUsage();
        const activeProcessingMode = config.processingMode;
        const activeRequestBuildMode = config.requestBuildMode;
        let outcome = "running";

        setStatus("Game running. Streaming assistant output...");

        try {
          while (state.running && state.attemptCount < state.maxAttempts) {
            const turn = state.attemptCount + 1;
            appendLog(`\n\n[Turn ${turn}]\n`);

            let turnResult = null;
            let retryCount = 0;
            while (true) {
              try {
                turnResult = await streamOneTurn(config, activeProcessingMode, activeRequestBuildMode);
                if (!turnResult.retryableNoToolCall) {
                  break;
                }

                retryCount += 1;
                appendLog(
                  `[Retry] Turn ${turn}: max tokens ${turnResult.maxTokens} reached (finish_reason=${turnResult.finishReason}) before tool call. Retrying ${retryCount}/${MAX_TOOL_CALL_RETRIES_PER_TURN}...\n`
                );
                if (retryCount >= MAX_TOOL_CALL_RETRIES_PER_TURN) {
                  const limitErr = new Error(
                    `Turn ${turn} retried ${MAX_TOOL_CALL_RETRIES_PER_TURN} times due to max token limit without tool call. Increase max tokens or improve prompt constraints.`
                  );
                  limitErr.retryLimitReached = true;
                  throw limitErr;
                }
                const retryUserMessage = buildRetryUserMessage({
                  type: "max_tokens_without_tool_call",
                  maxTokens: turnResult.maxTokens,
                  finishReason: turnResult.finishReason
                }, activeProcessingMode);
                if (retryUserMessage) {
                  state.messages.push({
                    role: "user",
                    content: retryUserMessage
                  });
                  appendLog("[Retry Hint] Added user guidance about previous max-token failure.\n");
                }
              } catch (err) {
                if (err && err.name === "AbortError") {
                  throw err;
                }
                if (err && err.retryLimitReached) {
                  throw err;
                }
                retryCount += 1;
                const message = String((err && err.message) || err || "Unknown error");
                if (
                  activeProcessingMode === PROCESSING_MODE_TOOL_CALL &&
                  isLikelyToolUnsupportedMessage(message)
                ) {
                  throw new Error(
                    `Tool call mode is not supported by this endpoint/model. Please switch Processing Mode to response_parsing and retry. Last error: ${message.slice(0, 280)}`
                  );
                }
                appendLog(
                  `[Retry] Turn ${turn}: invalid response (${message.slice(0, 280)}). Retrying ${retryCount}/${MAX_TOOL_CALL_RETRIES_PER_TURN}...\n`
                );
                if (retryCount >= MAX_TOOL_CALL_RETRIES_PER_TURN) {
                  throw new Error(
                    `Turn ${turn} retried ${MAX_TOOL_CALL_RETRIES_PER_TURN} times due to invalid response. Last error: ${message.slice(0, 280)}`
                  );
                }
                const failureType = classifyTurnFailure(message);
                if (failureType) {
                  const retryUserMessage = buildRetryUserMessage({ type: failureType }, activeProcessingMode);
                  if (retryUserMessage) {
                    state.messages.push({
                      role: "user",
                      content: retryUserMessage
                    });
                    appendLog(`[Retry Hint] Added user guidance about previous failure: ${failureType}.\n`);
                  }
                }
              }
            }
            const guess = turnResult.guess;
            const alreadyTried = state.triedGuesses.includes(guess);
            const inWordList = WORD_SET.has(guess);
            appendLog(`\n[Timing] ${formatTiming(turnResult.timing)}\n`);
            let usageForHistory = null;
            if (turnResult.usage && turnResult.usage.hasUsage) {
              addUsageTotals(state.gameUsage, turnResult.usage);
              appendLog(`[Token Usage] Turn ${formatUsage(turnResult.usage)} | Game ${formatUsage(state.gameUsage)}\n`);
              usageForHistory = {
                turn: cloneUsage(turnResult.usage),
                game: cloneUsage(state.gameUsage)
              };
            }

            if (alreadyTried) {
              const rejectReason = "Guess already attempted in this game. Review guess_history and choose a new word.";
              const historySummary = historySummaryText();
              const triedHistory = guessHistorySnapshot();
              appendLog("[Duplicate Guess] Already attempted. Attempt not consumed.\n");
              appendLog(`[History Count] ${historySummary}\n`);
              renderAttempt(turn, guess, rejectReason, "DUPLICATE", false, turnResult.timing, historySummary, usageForHistory, false);
              pushAssistantTurnMessage(turnResult, activeProcessingMode);
              pushFeedbackMessage(turnResult, activeProcessingMode, {
                guess,
                feedback_facts: getFeedbackFactsSnapshot(),
                error: "Guess already tried. Check guess_history and submit a new word.",
                already_tried: true,
                consumes_attempt: false,
                turn,
                attempts_used: state.attemptCount,
                attempts_remaining: state.maxAttempts - state.attemptCount,
                remaining_turns: state.maxAttempts - state.attemptCount,
                total_turns: state.maxAttempts,
                guess_history: triedHistory,
                history_count: triedHistory.length
              });
              continue;
            }

            state.triedGuesses.push(guess);
            const triedHistory = guessHistorySnapshot();

            const { statuses, pattern } = evaluateGuess(state.secret, guess);
            updateFeedbackFacts(guess, statuses);
            const feedbackFacts = getFeedbackFactsSnapshot();
            const solved = guess === state.secret;
            if (solved) {
              state.stats.correctGuesses += 1;
            } else {
              state.stats.wrongGuesses += 1;
            }
            saveStats();
            const historySummary = historySummaryText();
            if (!inWordList) {
              appendLog("[Out-of-List Guess] Not in local word list, evaluated normally.\n");
            }
            appendLog(`[History Count] ${historySummary}\n`);
            markRow(turn, guess, statuses);
            const renderReason = inWordList
              ? turnResult.reason
              : `${turnResult.reason ? `${turnResult.reason} ` : ""}(Out-of-list guess accepted and checked normally.)`;
            renderAttempt(turn, guess, renderReason, pattern, true, turnResult.timing, historySummary, usageForHistory);

            pushAssistantTurnMessage(turnResult, activeProcessingMode);
            const attemptsUsed = state.attemptCount + 1;
            pushFeedbackMessage(turnResult, activeProcessingMode, {
              guess,
              pattern,
              positions: statuses,
              feedback_facts: feedbackFacts,
              in_word_list: inWordList,
              solved: guess === state.secret,
              note: "G = correct place, Y = letter exists elsewhere, B = letter absent",
              turn,
              attempts_used: attemptsUsed,
              attempts_remaining: state.maxAttempts - attemptsUsed,
              remaining_turns: state.maxAttempts - attemptsUsed,
              total_turns: state.maxAttempts,
              guess_history: triedHistory,
              history_count: triedHistory.length
            });

            state.attemptCount += 1;

            if (solved) {
              setStatus(`Solved in ${turn} turns. Secret word: ${state.secret.toUpperCase()}.`);
              state.running = false;
              outcome = "win";
              break;
            }
          }

          if (state.running && state.attemptCount >= state.maxAttempts) {
            setStatus(`No solve in ${state.maxAttempts} turns. Secret word: ${state.secret.toUpperCase()}.`);
            state.running = false;
            outcome = "loss";
          }
          if (!state.running && !state.secret) {
            setStatus("Stopped.");
            outcome = "stopped";
          }
        } catch (err) {
          if (err && err.name === "AbortError") {
            setStatus("Stopped.");
            outcome = "stopped";
          } else {
            const message = String(err.message || err);
            showUiError(message);
            outcome = "error";
          }
        } finally {
          if (outcome === "win" || outcome === "loss") {
            state.stats.games += 1;
            if (outcome === "win") {
              state.stats.wins += 1;
            } else {
              state.stats.losses += 1;
            }
            saveStats();
            scheduleAutoNext();
          } else {
            renderStats();
          }
          state.abortController = null;
          state.currentReader = null;
          dom.startBtn.disabled = false;
          dom.stopBtn.disabled = true;
          dom.saveBtn.disabled = false;
        }
      }

      function stopGame() {
        clearAutoNextTimer();
        state.stopRequested = true;
        notifyStopWaiters();
        state.running = false;
        state.secret = "";
        if (state.abortController) {
          state.abortController.abort();
        }
        if (state.currentReader) {
          try {
            state.currentReader.cancel("stopped");
          } catch (_err) {
          }
        }
        setStatus("Stopping...");
      }

      dom.startBtn.addEventListener("click", () => {
        runGame({ autoTriggered: false });
      });
      dom.maxAttempts.addEventListener("change", () => {
        const parsed = parseMaxAttempts(dom.maxAttempts.value);
        dom.maxAttempts.value = String(parsed);
        if (!state.running) {
          createBoard(parsed);
        }
      });
      dom.stopBtn.addEventListener("click", stopGame);
      dom.saveBtn.addEventListener("click", saveConfig);
      dom.themeToggle.addEventListener("click", toggleThemeOverride);

      initTheme();
      loadConfig();
      loadStats();
      const initialMaxAttempts = parseMaxAttempts(dom.maxAttempts.value);
      dom.maxAttempts.value = String(initialMaxAttempts);
      state.maxAttempts = initialMaxAttempts;
      createBoard(initialMaxAttempts);
      appendLog("Ready. Click Start New Game.\n");
      appendLog(`Word list loaded: ${WORD_LIST.length} words.\n`);
    </script>
  </body>
</html>
